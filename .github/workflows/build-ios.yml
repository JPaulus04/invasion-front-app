name: Build & Upload iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Patch Xcode project
        run: |
          python3 - << 'EOF'
          import re

          path = "ios/App/App.xcodeproj/project.pbxproj"
          with open(path) as f:
              content = f.read()

          print("Bundle IDs found:")
          for m in re.finditer(r'PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);', content):
              print(" ", m.group(1).strip())

          content = re.sub(
              r'(PRODUCT_BUNDLE_IDENTIFIER = com\.paulus\.laststandcommand;)',
              r'\1\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_IDENTITY = "iPhone Distribution";',
              content
          )

          with open(path, "w") as f:
              f.write(content)

          print("Project patched successfully")
          EOF

      - name: Patch Podfile
        run: |
          python3 - << 'EOF'
          with open("ios/App/Podfile", "r") as f:
              content = f.read()

          signing_code = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
                config.build_settings.delete('PROVISIONING_PROFILE')
                config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
              end
            end
          """

          content = content.replace(
              "post_install do |installer|",
              "post_install do |installer|\n" + signing_code
          )

          with open("ios/App/Podfile", "w") as f:
              f.write(content)

          print("Podfile patched")
          EOF

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "build123" \
            -f pkcs12 \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision 2>/dev/null | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "Profile UUID: $UUID"
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -archivePath build/App.xcarchive \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>TEAM_ID_PLACEHOLDER</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>com.paulus.laststandcommand</key>
              <string>PROFILE_UUID_PLACEHOLDER</string>
            </dict>
          </dict></plist>
          PLIST
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${{ secrets.APPLE_TEAM_ID }}/" ExportOptions.plist
          sed -i '' "s/PROFILE_UUID_PLACEHOLDER/$PROFILE_UUID/" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/App.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Save IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: invasion-front-ipa
          path: build/ipa/App.ipa
          retention-days: 30
