name: Build & Upload iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Patch Xcode project
        run: |
          python3 - << 'EOF'
          import re

          path = "ios/App/App.xcodeproj/project.pbxproj"
          with open(path) as f:
              content = f.read()

          # Inject all signing settings directly into App target build configs
          # This way nothing needs to be passed on the command line
          content = re.sub(
              r'(PRODUCT_BUNDLE_IDENTIFIER = com\.paulus\.laststandcommand;)',
              (
                  r'\1\n'
                  r'\t\t\t\tCODE_SIGN_STYLE = Manual;\n'
                  r'\t\t\t\tCODE_SIGN_IDENTITY = "iPhone Distribution";\n'
                  r'\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "56ddc163-c89a-47a5-99f2-7c6099ec317d";'
              ),
              content
          )

          with open(path, "w") as f:
              f.write(content)

          print("Project patched — App target signing settings injected")
          EOF

      - name: Patch Podfile
        run: |
          python3 - << 'EOF'
          with open("ios/App/Podfile", "r") as f:
              content = f.read()

          signing_code = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
                config.build_settings.delete('PROVISIONING_PROFILE')
                config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Development'
              end
            end
          """

          content = content.replace(
              "post_install do |installer|",
              "post_install do |installer|\n" + signing_code
          )

          with open("ios/App/Podfile", "w") as f:
              f.write(content)

          print("Podfile patched")
          EOF

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security
